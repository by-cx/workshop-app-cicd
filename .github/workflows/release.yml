name: Release of a new version

# When this workflow should run
on:
  push:
    branches: [ main ]

  # Manual trigger — always available
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
        default: 'latest'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Permissions needed to push to GitHub Container Registry
    permissions:
      contents: read
      packages: write
    env:
      # Image name derived from the repository path
      IMAGE: ghcr.io/by-cx/workshop-app-cicd
      # Endpoint to notify Rosti to pull and restart after a push
      PULL_ENDPOINT: ${{ secrets.PULL_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4

      # Verify PULL_ENDPOINT secret is set (only checked when using a secret)
      - name: Test that PULL_ENDPOINT is set
        run: test -n "$PULL_ENDPOINT" || { echo "Secret PULL_ENDPOINT is not set!"; exit 1; }

      # Set image tag to short commit SHA on push
      - name: Get image tag on push
        if: github.event_name == 'push'
        run: echo "TAG_NAME=${GITHUB_SHA:0:7}" >> $GITHUB_ENV
      # Set image tag to git tag on release
      - name: Get image tag on release
        if: github.event_name == 'release'
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
      # Set image tag to the chosen string on manual trigger
      - name: Get image tag on workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "TAG_NAME=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      # Debug output
      - name: Debug info
        run: |
          echo "Username: ${{ github.actor }}"
          echo "Image: $IMAGE"
          echo "Image tag: ${{ env.TAG_NAME }}"

      # Log in to GitHub Container Registry
      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Build image
      - name: Build
        run: docker build -t $IMAGE:${{ env.TAG_NAME }} .

      # Tag as latest
      - name: Tag latest
        run: docker tag $IMAGE:${{ env.TAG_NAME }} $IMAGE:latest

      # Push versioned tag
      - name: Push
        run: docker push $IMAGE:${{ env.TAG_NAME }}

      # Push latest tag
      - name: Push latest
        run: docker push $IMAGE:latest

      # Tell Rosti to pull the new image and restart the stack
      - name: Call pull+up endpoint
        run: |
          RESPONSE=$(curl -s $PULL_ENDPOINT)
          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          if [ "$STATUS" = "0" ]; then
            echo "Pull endpoint call successful"
          else
            echo "Error: Pull endpoint returned status $STATUS"
            echo "--- STDOUT ---"
            echo "$RESPONSE" | jq -r '.stdout'
            echo "--- STDERR ---"
            echo "$RESPONSE" | jq -r '.stderr'
            exit 1
          fi
